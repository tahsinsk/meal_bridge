name: meal_bridge
description: "A local-first Flutter meal planner, recipe manager, and shopping list app."
publish_to: 'none'

version: 0.3.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#2E7D32"
  image: assets/icon/icon.png
  color_dark: "#1B5E20"
  image_dark: assets/icon/icon.png
  android_12:
    image: assets/icon/icon.png
    color: "#2E7D32"
  fullscreen: false

flutter:
  uses-material-design: true